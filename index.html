<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f17">
<title>Fortune Poker — High Hand Clock</title>
<style>
  :root {
    --bg: #0a0f17;
    --cyan: #00d9ff;
    --silver: #e6ecf5;
    --gold: #d4a437;
    --muted: rgba(230,236,245,0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; text-align: center; padding: 24px;
    color: var(--silver);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(ellipse 70% 60% at 22% 28%, rgba(99,102,241,0.22) 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 82% 72%, rgba(34,211,238,0.18) 0%, transparent 60%),
      linear-gradient(135deg, #0a0e1c 0%, #0e1322 50%, #0c1020 100%);
  }
  h1 {
    font-size: clamp(28px, 6vw, 56px);
    font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
  }
  h1 .gold { color: var(--gold); }
  .tag { color: var(--cyan); letter-spacing: 3px; text-transform: uppercase; font-size: clamp(13px, 2.4vw, 18px); }
  .note { color: var(--muted); max-width: 36ch; line-height: 1.5; }
</style>
</head>
<body>
  <div class="tag">Fortune Poker</div>
  <h1>High <span class="gold">Hand</span> Clock</h1>
  <p class="note">🚧 Scaffold in place — app coming soon. Design locked: fixed-interval drawing, TV display + synced operator control panel.</p>
</body>
</html>
